name: 🕸️ Daily Finance Monitor — Auto Deploy

on:
  # 每天早上8:00自动运行（中国时区 UTC+8）
  schedule:
    - cron: '0 0 * * *'   # UTC 00:00 = 北京时间 08:00
  # push 到 master 时也触发（方便手动测试）
  push:
    branches: [master]
    paths:
      - 'scripts/**'
      - 'run.sh'
      - '.github/workflows/**'
  # 也支持手动触发
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 💰 Fetch data & generate webpage
        run: |
          bash run.sh --save-only
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}

      - name: 🚀 Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Install Vercel CLI
          npm install -g vercel@latest

          # 部署 web/ 目录到 Vercel
          vercel deploy \
            --prebuilt \
            --token "$VERCEL_TOKEN" \
            --prod \
            web/

      - name: ✅ Done
        run: echo "✅ 部署完成！"
