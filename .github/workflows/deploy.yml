name: 🕸️ Daily Finance Monitor — Auto Deploy

on:
  # 每天早上8:00自动运行（中国时区 UTC+8）
  schedule:
    - cron: '0 0 * * *'   # UTC 00:00 = 北京时间 08:00
  # push 到 master 时也触发（方便手动测试）
  push:
    branches: [master]
    paths:
      - 'scripts/**'
      - 'run.sh'
      - 'web/**'
      - '.github/workflows/**'
  # 也支持手动触发
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: team_UFlSZ6tKv1vWOOXYU0PlVdeT
  VERCEL_PROJECT_ID: prj_ZgDuvOfJxYOy4SFRnbtxMK4kLUu9

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ../requirements.txt

      - name: 💰 Fetch data & generate webpage
        run: |
          bash ../run.sh --save-only
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}

      - name: 🚀 Deploy to Vercel (Production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm install -g vercel@latest
          # 链接到已有项目，避免创建新项目
          vercel pull --yes --environment=production \
            --token="$VERCEL_TOKEN"
          vercel deploy --prod \
            --token="$VERCEL_TOKEN"

      - name: ✅ Done
        run: echo "✅ 部署完成！页面已更新 → https://web-sage-mu-13.vercel.app"
